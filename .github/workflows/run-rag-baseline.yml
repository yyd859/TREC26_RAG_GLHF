name: Run RAG Baseline

on:
  workflow_dispatch:
    inputs:
      config:
        description: "Config file to run"
        required: true
        default: "configs/baseline_rag.yaml"
      limit:
        description: "Optional topic limit for smoke runs"
        required: false
        default: ""
  push:
    branches:
      - "codex/autoresearch-*"
    paths:
      - "configs/experiments/**"

jobs:
  rag-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Resolve experiment config
        id: resolve
        run: |
          CONFIG="${{ github.event.inputs.config || '' }}"
          LIMIT="${{ github.event.inputs.limit || '' }}"
          if [ -z "$CONFIG" ]; then
            CONFIG="$(python scripts/autoresearch.py latest-config)"
          fi
          ROUTE="$(python scripts/autoresearch.py route-config --config "$CONFIG" --field route)"
          if [ -z "$LIMIT" ]; then
            LIMIT="$(python scripts/autoresearch.py route-config --config "$CONFIG" --field default_limit)"
          fi
          echo "config=$CONFIG" >> "$GITHUB_OUTPUT"
          echo "limit=$LIMIT" >> "$GITHUB_OUTPUT"
          echo "route=$ROUTE" >> "$GITHUB_OUTPUT"
      - name: Prepare development topics
        if: ${{ steps.resolve.outputs.route == 'rag' }}
        run: python scripts/prepare_dev_topics.py
      - name: Run RAG baseline
        if: ${{ steps.resolve.outputs.route == 'rag' }}
        env:
          PYSERINI_API_TOKEN: ${{ secrets.PYSERINI_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_PROJECT: ${{ secrets.WANDB_PROJECT }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}
        run: |
          if [ -n "${{ steps.resolve.outputs.limit }}" ]; then
            python scripts/run_rag_baseline.py --config "${{ steps.resolve.outputs.config }}" --limit "${{ steps.resolve.outputs.limit }}" --log-wandb
          else
            python scripts/run_rag_baseline.py --config "${{ steps.resolve.outputs.config }}" --log-wandb
          fi
      - name: Upload local outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rag-baseline-outputs
          path: outputs/
