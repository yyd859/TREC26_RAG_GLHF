name: Autoresearch Orchestrator

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Autoresearch command"
        required: true
        default: "iterate"
        type: choice
        options:
          - iterate
          - propose
          - dispatch
          - monitor
          - best-run
          - routes
      route:
        description: "Route to use"
        required: false
        default: "retrieval"
      config:
        description: "Reviewed config path for dispatch"
        required: false
        default: ""
      ref:
        description: "Git ref for workflow dispatch/monitor"
        required: false
        default: "main"
      limit:
        description: "Optional workflow topic limit"
        required: false
        default: ""
  schedule:
    - cron: "0 14 * * 1"

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  autoresearch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Show routes
        if: ${{ inputs.command == 'routes' }}
        run: python scripts/autoresearch.py routes
      - name: Show current best W&B run
        if: ${{ inputs.command == 'best-run' }}
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_PROJECT: ${{ secrets.WANDB_PROJECT }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}
        run: python scripts/autoresearch.py best-run
      - name: Run branch-native experiment iteration
        if: ${{ github.event_name == 'schedule' || inputs.command == 'iterate' }}
        env:
          GITHUB_TOKEN: ${{ secrets.AUTORESEARCH_GITHUB_TOKEN || github.token }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_PROJECT: ${{ secrets.WANDB_PROJECT }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "${{ inputs.limit }}" ]; then
            python scripts/autoresearch.py iterate --route "${{ inputs.route || 'retrieval' }}" --ref "${{ inputs.ref || 'main' }}" --limit "${{ inputs.limit }}"
          else
            python scripts/autoresearch.py iterate --route "${{ inputs.route || 'retrieval' }}" --ref "${{ inputs.ref || 'main' }}"
          fi
      - name: Generate config-only proposal
        if: ${{ inputs.command == 'propose' }}
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_PROJECT: ${{ secrets.WANDB_PROJECT }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}
        run: python scripts/autoresearch.py propose --route "${{ inputs.route || 'retrieval' }}"
      - name: Check proposed paths
        if: ${{ inputs.command == 'propose' }}
        run: python scripts/autoresearch.py check --route "${{ inputs.route || 'retrieval' }}" configs/experiments/
      - name: Dispatch reviewed experiment workflow
        if: ${{ inputs.command == 'dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.AUTORESEARCH_GITHUB_TOKEN || github.token }}
        run: |
          if [ -n "${{ inputs.limit }}" ]; then
            python scripts/autoresearch.py dispatch --route "${{ inputs.route }}" --config "${{ inputs.config }}" --ref "${{ inputs.ref }}" --limit "${{ inputs.limit }}"
          else
            python scripts/autoresearch.py dispatch --route "${{ inputs.route }}" --config "${{ inputs.config }}" --ref "${{ inputs.ref }}"
          fi
      - name: Monitor route workflow
        if: ${{ inputs.command == 'monitor' }}
        env:
          GITHUB_TOKEN: ${{ secrets.AUTORESEARCH_GITHUB_TOKEN || github.token }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_PROJECT: ${{ secrets.WANDB_PROJECT }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}
        run: python scripts/autoresearch.py monitor --route "${{ inputs.route }}" --branch "${{ inputs.ref }}" --include-wandb --log-wandb
