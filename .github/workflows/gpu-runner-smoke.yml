name: GPU Runner Smoke

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note for this runner smoke test"
        required: false
        default: ""

jobs:
  gpu-smoke:
    runs-on: [self-hosted, linux, x64, gpu, vast-ai]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Show runner context
        run: |
          echo "runner.name=${RUNNER_NAME}"
          echo "runner.os=${RUNNER_OS}"
          echo "runner.arch=${RUNNER_ARCH}"
          echo "note=${{ inputs.note }}"
      - name: Check NVIDIA GPU
        run: nvidia-smi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install CUDA PyTorch
        run: python -m pip install torch --index-url https://download.pytorch.org/whl/cu121
      - name: Check PyTorch CUDA
        run: |
          python - <<'PY'
          import torch

          print("torch_version=", torch.__version__)
          print("cuda_available=", torch.cuda.is_available())
          if not torch.cuda.is_available():
              raise SystemExit("PyTorch cannot see CUDA")
          print("cuda_device=", torch.cuda.get_device_name(0))
          PY
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests
