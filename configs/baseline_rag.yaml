experiment:
  name: baseline_rag_title_haiku45
  hypothesis: "A title-only retrieval query plus Claude Haiku 4.5 is the smallest useful RAG baseline."
  task: rag
  track_year: 2026
  team_id: glhf
  run_id: glhf-rag-title-haiku45

data:
  topics_path: data/trec_rag_2026_queries.jsonl

retrieval:
  api_base_url: "http://99.251.12.72:8081"
  index: climbmix-400b
  query_template: "{title}"
  hits: 20
  timeout_seconds: 30

output:
  output_dir: outputs
  runfile_name: r_output_trec_rag_2026.tsv
  rag_output_name: rag_output_trec_rag_2026.jsonl
  validation_report_name: retrieval_validation_report.json
  rag_validation_report_name: rag_validation_report.json

evaluation:
  qrels_path: null
  relevance_threshold: 1
  metrics:
    - ndcg@10
    - recall@100
    - map
    - mrr

rag:
  enabled: true
  evidence_top_k: 5
  generator_provider: anthropic_batch
  model: claude-haiku-4-5-20251001
  prompt_template: |
    Answer the topic using only the provided ClimbMix evidence. Return concise
    sentence-level claims. The references array must include only evidence
    documents that are cited by at least one answer sentence.
  max_output_tokens: 800

wandb:
  project: trec26-rag-glhf
  entity: null
  mode: online
  tags:
    - baseline
    - rag
    - claude-haiku-4-5
    - climbmix-400b
    - dev

optimization:
  objective_metric: rag_validation_error_count
  objective_direction: minimize
